services:
  slspanel:
    image: ghcr.io/jahaddow/slspanel:latest
    container_name: slspanel
    restart: unless-stopped
    environment:
      - TZ=UTC
      - SLS_API_URL=http://sls-api-url:8789
      - SLS_API_KEY=yourapikey
      - PUSH_INTERNAL_TOKEN=change-me
      - SLSPANEL_DB_PATH=/app/data/db.sqlite3
      - SRT_PUBLISH_PORT=4001
      - SRT_PLAYER_PORT=4000
      - SRTLA_PUBLISH_PORT=5000
      - SLS_DOMAIN_IP=your-sls-domain-sls-domain-ip
      - SLS_STATS_DOMAIN_IP=your-sls-stats-domain-sls-domain-ip
      - SLS_STATS_PORT=8789
      - REQUIRE_LOGIN=True
      - USERNAME=admin
      - PASSWORD=change-me
    ports:
      - "8000:8000/tcp"
    volumes:
      - slspanel-data:/app/data

volumes:
  slspanel-data:
