name: Docker Multi-Platform Build

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          if [ "${GITHUB_REF_NAME}" = "beta" ]; then
            echo "channel_tag=beta" >> "$GITHUB_OUTPUT"
            echo "sha_tag=beta-sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "channel_tag=latest" >> "$GITHUB_OUTPUT"
            echo "sha_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: |
            ghcr.io/jahaddow/slspanel:${{ steps.tags.outputs.channel_tag }}
            ghcr.io/jahaddow/slspanel:${{ steps.tags.outputs.sha_tag }}
